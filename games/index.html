<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎵 Games</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0d0c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      color: #eef4f1;
    }
    button {
      background: #4ade80;
      color: #06120a;
      border: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover { background: #6ff09a; }
    p { color: #6f7e78; margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <audio id="bg-audio" src="media/media1.MP3" loop></audio>
  <div id="ui">
    <button id="play-btn">▶ Play</button>
    <p id="status">Click to start audio</p>
  </div>
  <script>
    const audio = document.getElementById('bg-audio');
    const btn = document.getElementById('play-btn');
    const status = document.getElementById('status');

    // Try muted autoplay; unmute on first interaction
    audio.muted = true;
    audio.play().then(() => {
      status.textContent = 'Playing (muted until you click)';
    }).catch(() => {});

    btn.addEventListener('click', () => {
      audio.muted = false;
      audio.play().then(() => {
        status.textContent = 'Playing';
        btn.textContent = '⏸ Pause';
        btn.onclick = () => {
          if (audio.paused) { audio.play(); btn.textContent = '⏸ Pause'; status.textContent = 'Playing'; }
          else { audio.pause(); btn.textContent = '▶ Play'; status.textContent = 'Paused'; }
        };
      });
    });
  </script>
</body>
</html>
