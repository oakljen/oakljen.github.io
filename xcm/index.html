<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XCM Productions</title>
  <meta name="description" content="XCM Productions — creative media and production.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('contact-form');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    console.warn('Webhook calls must go through a server-side proxy — direct client-side webhook calls expose the token.');
    alert('Contact form temporarily unavailable.');
  });
});

  </script>
</head>
<body>
  <div class="hero-image">
    <header>
      <nav>
        <h1 class="topHeader">XCM Productions</h1>
      </nav>
    </header>
    <div class="hero-text">
      <h1 class="hero-text-main">I am Xavier</h1>
      <p class="hero-text-sub">And I'm a Videographer and Editor</p>
    </div>
  </div>

  <div class="contactme">
    <h2 class="contactme-topHeader">Contact Us</h2>
    <hr class="separator" role="separator" aria-hidden="true">
    <p>Drop us a line!</p>

    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <input type="text" id="name" name="name" placeholder=" " required>
        <label for="name">Name*</label>
      </div>

      <div class="form-group">
        <input type="email" id="email" name="email" placeholder=" " required>
        <label for="email">Email*</label>
      </div>

      <div class="form-group">
        <textarea id="message" name="message" rows="4" placeholder=" " required></textarea>
        <label for="message">Message*</label>
      </div>

      <button type="submit" class="submit-button">Send</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2025 XCM Productions – All Rights Reserved.</p>
  </footer>
</body>
</html>
