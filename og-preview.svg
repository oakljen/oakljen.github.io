<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#020508"/>
      <stop offset="50%"  stop-color="#051525"/>
      <stop offset="100%" stop-color="#020508"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#00c87a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020508" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#5040dc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#020508" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.7)"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Stars -->
  <circle cx="80"  cy="60"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="200" cy="30"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="350" cy="80"  r="2"   fill="white" opacity="0.6"/>
  <circle cx="500" cy="20"  r="1.5" fill="white" opacity="0.8"/>
  <circle cx="700" cy="55"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="900" cy="25"  r="2"   fill="white" opacity="0.7"/>
  <circle cx="1050" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1150" cy="40" r="1"   fill="white" opacity="0.5"/>
  <circle cx="140" cy="550" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="400" cy="590" r="1"   fill="white" opacity="0.5"/>
  <circle cx="750" cy="560" r="2"   fill="white" opacity="0.6"/>
  <circle cx="1000" cy="580" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="600" cy="120" r="1"   fill="white" opacity="0.7"/>
  <circle cx="820" cy="90"  r="1.5" fill="white" opacity="0.5"/>

  <!-- Glowing border accent -->
  <rect x="0" y="0" width="8" height="630" fill="#38bdf8" opacity="0.85"/>
  <rect x="0" y="0" width="8" height="630" fill="#38bdf8" opacity="0.4" filter="url(#blur)"/>

  <!-- Flight path arc -->
  <path d="M 280 430 Q 600 220 920 350"
        fill="none" stroke="rgba(56,189,248,0.18)" stroke-width="18" stroke-linecap="round"
        filter="url(#blur)"/>
  <path d="M 280 430 Q 600 220 920 350"
        fill="none" stroke="rgba(56,189,248,0.5)" stroke-width="2.5"
        stroke-dasharray="14 10" stroke-linecap="round"/>

  <!-- Sydney dot -->
  <circle cx="280" cy="430" r="14" fill="rgba(56,189,248,0.15)"/>
  <circle cx="280" cy="430" r="7"  fill="#38bdf8"/>

  <!-- Auckland dot -->
  <circle cx="920" cy="350" r="14" fill="rgba(52,211,153,0.15)"/>
  <circle cx="920" cy="350" r="7"  fill="#34d399"/>

  <!-- Plane emoji approximation in SVG (text) -->
  <text x="600" y="275" font-size="52" text-anchor="middle" dominant-baseline="middle"
        font-family="Segoe UI Emoji,Apple Color Emoji,sans-serif">✈️</text>

  <!-- Main title -->
  <text x="600" y="195" font-size="82" font-weight="900" text-anchor="middle"
        font-family="Inter,Segoe UI,Arial,sans-serif" fill="white" opacity="0.97"
        filter="url(#shadow)">Riley Visit</text>

  <!-- Subtitle / route -->
  <text x="600" y="260" font-size="32" font-weight="600" text-anchor="middle"
        font-family="Inter,Segoe UI,Arial,sans-serif" fill="rgba(125,211,247,0.9)">
    🦘 Sydney, NSW  →  🥝 Auckland, NZ
  </text>

  <!-- Date pill -->
  <rect x="375" y="490" width="450" height="72" rx="36"
        fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.35)" stroke-width="2"/>
  <text x="600" y="534" font-size="28" font-weight="700" text-anchor="middle"
        dominant-baseline="middle"
        font-family="Inter,Segoe UI,Arial,sans-serif" fill="rgba(255,255,255,0.85)">
    📅  Saturday, 8 August 2026
  </text>

  <!-- URL watermark -->
  <text x="600" y="608" font-size="18" text-anchor="middle"
        font-family="Inter,Segoe UI,Arial,sans-serif" fill="rgba(255,255,255,0.2)"
        letter-spacing="2">oakljen.github.io/countdown</text>
</svg>
