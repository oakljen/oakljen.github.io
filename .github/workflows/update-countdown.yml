name: Update Discord Countdown Embed

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-embed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recalculate countdown & patch meta tags
        run: node scripts/update-embed.js

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No change" || (
            git add countdown.html
            git commit -m "chore: refresh countdown embed [skip ci]"
            git push
          )
